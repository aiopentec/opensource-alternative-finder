# .github/workflows/alerts.yml
# Sends a Slack notification whenever the main pipeline fails

name: Pipeline Failure Alerts

on:
  workflow_run:
    workflows: ["Open Source Alternative Pipeline"]
    types: [completed]

jobs:
  alert-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Send Slack Alert
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"❌ *Pipeline Failed* — Run #${{ github.event.workflow_run.run_number }}\",
              \"attachments\": [{
                \"color\": \"#ff0000\",
                \"fields\": [
                  {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Triggered by\", \"value\": \"${{ github.event.workflow_run.event }}\", \"short\": true}
                ],
                \"actions\": [{
                  \"type\": \"button\",
                  \"text\": \"View Logs\",
                  \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}\"
                }]
              }]
            }" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
